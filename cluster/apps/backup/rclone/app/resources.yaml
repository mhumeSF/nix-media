---
# Backblaze B2 backup source: only the curated photo archive.
# nodeAffinity pins the claim (and therefore the rclone pod) to the node that
# actually holds /media/photos/archive. This is critical: `rclone sync` mirrors
# and DELETES, so a pod scheduled on a node without this data would prune the
# remote bucket.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: photos-archive-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /media/photos/archive
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - k3s
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: photos-archive-pvc
  namespace: backup
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: ""
  volumeName: photos-archive-pv
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rclone-config
  namespace: backup
data:
  rclone.conf: |
    [b2]
    type = b2
    account = ${B2_APPLICATION_KEY_ID}
    key = ${B2_APPLICATION_KEY}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rclone-sync
  namespace: backup
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: rclone
            image: rclone/rclone:latest
            args:
            - sync
            - /data
            - b2:${B2_BUCKET}
            - --verbose
            - --checksum
            volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: rclone-config
              mountPath: /config/rclone
              readOnly: true
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: photos-archive-pvc
          - name: rclone-config
            configMap:
              name: rclone-config
