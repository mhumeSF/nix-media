---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-hello
  namespace: flux-system
spec:
  dependsOn:
  - name: cluster-apps-gateway-api
  path: ./cluster/apps/default/hello/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 3m
  postBuild:
    substituteFrom:
    - kind: Secret
      name: cluster-secrets
      optional: false
