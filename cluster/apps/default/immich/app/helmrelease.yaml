---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: immich
      version: 0.12.0
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  maxHistory: 3
  values:
    controllers:
      main:
        containers:
          main:
            env:
              TZ: America/New_York
              DB_HOSTNAME: immich-postgres-rw
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-app
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-app
                    key: password
              DB_DATABASE_NAME: immich

    immich:
      persistence:
        library:
          existingClaim: immich-library-pvc

    server:
      enabled: true
      image:
        repository: ghcr.io/immich-app/immich-server
        tag: v2.7.5
      # Photo-workflow external libraries. Immich indexes these as External
      # Libraries; mounted read-only so Immich never modifies the originals.
      # The server pod also runs the microservices/background jobs in Immich
      # v2.x, so these mounts cover indexing/thumbnailing too.
      #
      # These paths live under the `gato-bucket` virtiofs share that the k3s
      # MicroVM already mounts from the media.local ZFS host
      # (host: /tank0/gato-bucket/photos/* -> VM: /gato-bucket/photos/*). They
      # must be on this share (not an arbitrary VM path), otherwise kubelet
      # would create throwaway dirs on the VM's ephemeral rootfs that media.local
      # cannot see. The Immich-managed upload store stays on the `library` claim
      # (immich-library-pvc -> /gato-bucket/immich), mounted by the chart's
      # hardcoded `data` volume.
      persistence:
        inbox:
          enabled: true
          type: hostPath
          hostPath: /gato-bucket/photos/inbox
          hostPathType: Directory
          globalMounts:
          - path: /external/inbox
            readOnly: true
        archive:
          enabled: true
          type: hostPath
          hostPath: /gato-bucket/photos/archive
          hostPathType: Directory
          globalMounts:
          - path: /external/archive
            readOnly: true

    machine-learning:
      enabled: true
      image:
        repository: ghcr.io/immich-app/immich-machine-learning
        tag: v2.7.5
      persistence:
        cache:
          enabled: true
          type: emptyDir

    valkey:
      enabled: true
