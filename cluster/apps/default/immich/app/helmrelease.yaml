---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: immich
      version: 0.12.0
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  maxHistory: 3
  values:
    controllers:
      main:
        containers:
          main:
            env:
              TZ: America/New_York
              DB_HOSTNAME: immich-postgres-rw
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-app
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-app
                    key: password
              DB_DATABASE_NAME: immich

    immich:
      persistence:
        library:
          existingClaim: immich-library-pvc

    server:
      enabled: true
      image:
        repository: ghcr.io/immich-app/immich-server
        tag: v2.7.5

    machine-learning:
      enabled: true
      image:
        repository: ghcr.io/immich-app/immich-machine-learning
        tag: v2.7.5
      persistence:
        cache:
          enabled: true
          type: emptyDir

    valkey:
      enabled: true
