---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  values:
    controllers:
      plex:
        containers:
          app:
            image:
              repository: docker.io/plexinc/pms-docker
              tag: latest
            env:
              VERSION: public
              UMASK_SET: "022"
              # visit https://plex.tv/claim
              PLEX_CLAIM: ${PLEX_CLAIM}
              PLEX_UID: "1000"
              PLEX_GID: "100"
              PLEX_ADVERTISE_URL: "https://plex.${CLUSTER_DOMAIN}"
            securityContext:
              privileged: true
    service:
      app:
        primary: true
        controller: plex
        ports:
          http:
            port: 32400
        type: ClusterIP
    ingress:
      main:
        enabled: false
    persistence:
      tmp:
        enabled: true
        hostPath: /plex/tmp
        type: hostPath
        globalMounts:
        - path: /tmp
          readOnly: false
      transcode:
        enabled: true
        hostPath: /plex/transcode
        type: hostPath
        globalMounts:
        - path: /transcode
          readOnly: false
      config:
        enabled: true
        hostPath: /plex/config
        type: hostPath
        globalMounts:
        - path: /config
          readOnly: false
      tv:
        enabled: true
        hostPath: /tv
        type: hostPath
        globalMounts:
        - path: /tv
          readOnly: true
      movies:
        enabled: true
        hostPath: /movies
        type: hostPath
        globalMounts:
        - path: /movies
          readOnly: true
      misc:
        enabled: true
        hostPath: /tank0/misc
        type: hostPath
        globalMounts:
        - path: /misc
          readOnly: true
