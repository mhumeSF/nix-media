---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-gateway
  namespace: networking
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=oci://ghcr.io/k8s-gateway/charts
      chart: k8s-gateway
      version: 3.4.2
      sourceRef:
        kind: HelmRepository
        name: k8s-gateway
        namespace: flux-system
  maxHistory: 3
  values:
    domain: ${CLUSTER_DOMAIN}
    service:
      type: LoadBalancer
      loadBalancerIP: "${K8S_GATEWAY}"
      externalTrafficPolicy: Local
