---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway-crds
  namespace: networking
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=oci://registry-1.docker.io/envoyproxy
      chart: gateway-crds-helm
      version: 1.7.2
      sourceRef:
        kind: HelmRepository
        name: envoyproxy
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    crds:
      envoyGateway:
        enabled: true
      gatewayAPI:
        enabled: false
