---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: networking
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=oci://registry-1.docker.io/envoyproxy
      chart: gateway-helm
      version: v1.7.2
      sourceRef:
        kind: HelmRepository
        name: envoyproxy
        namespace: networking
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    crds:
      envoyGateway:
        enabled: true
      gatewayAPI:
        enabled: false
    deployment:
      replicas: 1
    service:
      type: ClusterIP
