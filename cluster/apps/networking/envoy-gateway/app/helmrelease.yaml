---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: networking
spec:
  interval: 5m
  dependsOn:
  - name: envoy-gateway-crds
  chart:
    spec:
      # renovate: registryUrl=oci://registry-1.docker.io/envoyproxy
      chart: gateway-helm
      version: 1.7.2
      sourceRef:
        kind: HelmRepository
        name: envoyproxy
        namespace: flux-system
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    deployment:
      replicas: 1
