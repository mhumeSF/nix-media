---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  dependsOn:
  - name: gateway-api-crds
  - name: envoy-gateway-crds
  path: ./cluster/apps/networking/envoy-gateway/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
  - apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: envoy-gateway
    namespace: networking
  interval: 30m
  retryInterval: 1m
  timeout: 10m
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: cluster-settings
      optional: false
