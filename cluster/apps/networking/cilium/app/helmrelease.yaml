---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://helm.cilium.io/
      chart: cilium
      version: 1.19.3
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  maxHistory: 3
  values:
    kubeProxyReplacement: true
    k8sServiceHost: localhost
    k8sServicePort: 6443
    ipam:
      mode: kubernetes
      operator:
        clusterPoolIPv4PodCIDRList: "10.42.0.0/16"

    # LB-IPAM (replaces MetalLB)
    l2announcements:
      enabled: true
    externalIPs:
      enabled: true

    # BGP Control Plane
    bgpControlPlane:
      enabled: true

    # Gateway API (replaces Ingress Controller)
    # NOTE: L7 proxy has connectivity issues with vxlan tunnel mode
    # See: https://github.com/cilium/cilium/issues
    gatewayAPI:
      enabled: true

    # Socket LB for service redirection
    socketLB:
      enabled: true

    # Disable legacy Ingress Controller (using Gateway API instead)
    ingressController:
      enabled: false

    # Hubble observability
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true

    operator:
      replicas: 1

    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        trustCRDsExist: true
