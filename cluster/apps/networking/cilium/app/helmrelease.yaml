---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://helm.cilium.io/
      chart: cilium
      version: 1.19.2
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  maxHistory: 3
  values:
    kubeProxyReplacement: true
    k8sServiceHost: localhost
    k8sServicePort: 6443
    ipam:
      mode: kubernetes
      operator:
        clusterPoolIPv4PodCIDRList: "10.42.0.0/16"

    # LB-IPAM (replaces MetalLB)
    externalIPs:
      enabled: true
    bgpControlPlane:
      enabled: true

    # Gateway API
    gatewayAPI:
      enabled: true

    # Hubble observability
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true

    operator:
      replicas: 1

    prometheus:
      enabled: true
      serviceMonitor:
        enabled: false
