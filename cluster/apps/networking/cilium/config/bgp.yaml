---
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: mikrotik-peer
spec:
  timers:
    holdTimeSeconds: 9
    keepAliveTimeSeconds: 3
  families:
  - afi: ipv4
    safi: unicast
    advertisements:
      matchLabels:
        advertise: bgp
---
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: service-loadbalancers
  labels:
    advertise: bgp
spec:
  advertisements:
  - advertisementType: Service
    service:
      addresses:
      - LoadBalancerIP
    # Advertise all LoadBalancer services, including the generated cilium-gateway-* service.
    selector:
      matchExpressions:
      - key: somekey
        operator: NotIn
        values:
        - never-used-value
---
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
  - name: instance-65000
    localASN: 65000
    peers:
    - name: mikrotik
      peerASN: 65000
      peerAddress: 10.0.200.1
      peerConfigRef:
        name: mikrotik-peer
