---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
spec:
  addresses:
  # .202 is reserved for the host (native Plex) via a router DHCP reservation;
  # keep it out of the pool so MetalLB never hands it to a cluster LB.
  - 10.0.201.200-10.0.201.201
  - 10.0.201.203-10.0.201.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default-l2
spec:
  ipAddressPools:
  - default-pool
