---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: omada-controller
  namespace: flux-system
spec:
  dependsOn:
  - name: cert-manager
  path: ./cluster/apps/networking/omada-controller/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
  - apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: omada-controller
    namespace: networking
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substituteFrom:
    - kind: Secret
      name: cluster-secrets
      optional: false
    - kind: ConfigMap
      name: cluster-settings
      optional: false
