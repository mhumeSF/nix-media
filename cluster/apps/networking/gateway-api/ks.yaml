---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api
  namespace: flux-system
spec:
  path: ./cluster/apps/networking/gateway-api/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-resources
  namespace: flux-system
spec:
  dependsOn:
  - name: gateway-api
  - name: cilium
  - name: envoy-gateway
  path: ./cluster/apps/networking/gateway-api/resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substituteFrom:
    - kind: Secret
      name: cluster-secrets
      optional: false
    - kind: ConfigMap
      name: cluster-settings
      optional: false
