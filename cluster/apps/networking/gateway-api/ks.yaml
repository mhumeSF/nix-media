---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-gateway-api
  namespace: flux-system
spec:
  dependsOn:
  - name: cluster-apps-cilium
  path: ./cluster/apps/networking/gateway-api/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
