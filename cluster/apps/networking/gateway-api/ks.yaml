---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-gateway-api
  namespace: flux-system
spec:
  dependsOn:
  - name: cluster-apps-cilium
  - name: cluster-apps-cert-manager
  path: ./cluster/apps/networking/gateway-api/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: cluster-settings
      optional: false
    - kind: Secret
      name: cluster-secrets
      optional: false
