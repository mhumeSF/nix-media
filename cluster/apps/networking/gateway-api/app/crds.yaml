---
# Gateway API Standard CRDs v1.2.0
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: gateway-api
  namespace: flux-system
spec:
  interval: 12h
  url: oci://ghcr.io/fluxcd/gateway-api-manifests
  ref:
    tag: v1.2.0
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 1h
  prune: false
  sourceRef:
    kind: OCIRepository
    name: gateway-api
  path: ./standard
